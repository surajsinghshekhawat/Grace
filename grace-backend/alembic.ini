# Grace — Alembic (SQLite by default; set GRACE_DB_PATH to match app.config)

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# Overridden in env.py from GRACE_DB_PATH
sqlalchemy.url = sqlite:///grace.db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
